<body>
<div id="pin-lock">
  <div class="pin-logo">💰</div>
  <div class="pin-title">Budget Tracker</div>
  <div class="pin-subtitle">Enter your PIN to continue</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad" id="pin-pad">
    <button class="pin-key" data-digit="1">1</button>
    <button class="pin-key" data-digit="2">2</button>
    <button class="pin-key" data-digit="3">3</button>
    <button class="pin-key" data-digit="4">4</button>
    <button class="pin-key" data-digit="5">5</button>
    <button class="pin-key" data-digit="6">6</button>
    <button class="pin-key" data-digit="7">7</button>
    <button class="pin-key" data-digit="8">8</button>
    <button class="pin-key" data-digit="9">9</button>
    <button class="pin-key empty" disabled aria-hidden="true"></button>
    <button class="pin-key" data-digit="0">0</button>
    <button class="pin-key del" id="pin-del" aria-label="Delete">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>
<script>
(function(){
  var CORRECT='1221';
  var entered='';

  var lockEl=document.getElementById('pin-lock');
  var rootEl=document.getElementById('root');
  var dotsEl=document.getElementById('pin-dots');
  var errorEl=document.getElementById('pin-error');

  if(sessionStorage.getItem('pin_auth')==='1'){
    lockEl.style.display='none';
    return;
  }

  rootEl.style.display='none';

  function updateDots(){
    for(var i=0;i<4;i++){
      var dot=document.getElementById('pd'+i);
      dot.classList.toggle('filled',i<entered.length);
      dot.classList.remove('error');
    }
  }

  function addDigit(d){
    if(entered.length>=4)return;
    entered+=d;
    updateDots();
    if(entered.length===4)checkPin();
  }

  function delDigit(){
    if(entered.length===0)return;
    entered=entered.slice(0,-1);
    errorEl.textContent='';
    updateDots();
  }

  function checkPin(){
    if(entered===CORRECT){
      sessionStorage.setItem('pin_auth','1');
      lockEl.style.display='none';
      rootEl.style.display='';
    } else {
      for(var i=0;i<4;i++)document.getElementById('pd'+i).classList.add('error');
      dotsEl.classList.add('shake');
      errorEl.textContent='Incorrect PIN. Try again.';
      setTimeout(function(){
        entered='';
        dotsEl.classList.remove('shake');
        updateDots();
      },600);
    }
  }

  // Attach listeners via event delegation on the pad
  document.getElementById('pin-pad').addEventListener('click',function(e){
    var btn=e.target.closest('button');
    if(!btn)return;
    var digit=btn.getAttribute('data-digit');
    if(digit!==null)addDigit(digit);
  });

  document.getElementById('pin-del').addEventListener('click',function(){
    delDigit();
  });

  // Keyboard support
  document.addEventListener('keydown',function(e){
    if(lockEl.style.display==='none')return;
    if(e.key>='0'&&e.key<='9')addDigit(e.key);
    if(e.key==='Backspace')delDigit();
  });
})();
</script>

const fmtDate = s => {
  try{
    if(!s) return '';
    // Handle ISO dates from Google Sheets (2026-03-09T00:00:00.000Z)
    if(s.includes('T')||s.includes('-')){const d=new Date(s);return MONTHS[d.getMonth()]+' '+d.getDate()}
    // Handle MM/DD/YYYY from Morgan Stanley
    const p=s.split('/');return MONTHS[parseInt(p[0])-1]+' '+parseInt(p[1])
  }catch{return String(s)}
};
const parseAnyDate = s => {
  if(!s) return null;
  if(s instanceof Date) return s;
  if(typeof s==='number') return new Date((s-25569)*86400000); // Excel serial date
  const str=String(s).trim();
  if(str.includes('T')||str.match(/^\d{4}-/)) return new Date(str);
  if(str.includes('/')){const p=str.split('/');return new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]))}
  return new Date(str);
};

      } else {

// ===== MORGAN STANLEY PARSER =====
function parseMSFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        let hdr = -1;
        for(let i=0;i<rows.length;i++){
          if(rows[i][0] && rows[i][0].toString().trim()==='Activity Date'){hdr=i;break}
        }
        if(hdr<0) throw new Error('Activity Date header not found');
        const h = {};
        rows[hdr].forEach((v,i)=>{h[String(v).trim()]=i});
        const txns=[], seen=new Set();
        for(let i=hdr+1;i<rows.length;i++){
          const r=rows[i];
          if(!r||!r[h['Activity Date']]) continue;
          const act=(r[h['Activity']]||'').toString().trim();
          if(!['Funds Paid','Withdrawal','Funds Paid Adj'].includes(act)) continue;
          const cat=(r[h['Category']]||'').toString().trim();
          if(['Credit Card Payments','Transfers','Savings','Deposits','Refunds/Adjustments'].includes(cat)) continue;
          const pc=(r[h['Primary Category']]||'').toString().trim();
          if(!pc || pc==='TRANSFER') continue;
          const date=(r[h['Activity Date']]||'').toString().trim();
          const desc=(r[h['Simple Description']]||'').toString().trim();
          const merchant=(r[h['Merchant']]||'').toString().trim()||desc;
          const amt=Math.abs(parseFloat(r[h['Amount']])||0);
          const catType=(r[h['Category Type']]||'').toString().trim();
          let mapped=cat;
          const low=cat.toLowerCase();
          if(CAT_MAP[low]) mapped=CAT_MAP[low];
          const dk=`${date}|${desc}|${amt}`;
          if(seen.has(dk)) continue;
          seen.add(dk);
          txns.push({date,simpleDescription:desc,merchant,category:mapped,categoryType:catType,primaryCategory:pc,amount:amt});
        }
        txns.sort((a,b)=>new Date(b.date)-new Date(a.date));
        resolve(txns);
      }catch(err){reject(err)}
    };
    reader.onerror=()=>reject(new Error('File read failed'));
    reader.readAsArrayBuffer(file);
  });
}

// ===== GOOGLE SHEETS SYNC =====
function parseSheetRows(rows){
  // Same logic as parseMSFile but operating on array-of-arrays from Google Sheets
  // Find Activity Date header row
  let hdr = -1;
  for(let i=0;i<rows.length;i++){
    if(rows[i][0] && rows[i][0].toString().trim()==='Activity Date'){hdr=i;break}
  }
  if(hdr<0) return []; // No activity section found

  const h = {};
  rows[hdr].forEach((v,i)=>{h[String(v).trim()]=i});
  const txns=[], seen=new Set();
  for(let i=hdr+1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r[h['Activity Date']]) continue;
    const act=(r[h['Activity']]||'').toString().trim();
    if(!['Funds Paid','Withdrawal','Funds Paid Adj'].includes(act)) continue;
    const cat=(r[h['Category']]||'').toString().trim();
    if(['Credit Card Payments','Transfers','Savings','Deposits','Refunds/Adjustments'].includes(cat)) continue;
    const pc=(r[h['Primary Category']]||'').toString().trim();
    if(!pc || pc==='TRANSFER') continue;
    // Handle dates: Google Sheets may return ISO string, Date object, or MM/DD/YYYY
    const rawDate = r[h['Activity Date']];
    const d = parseAnyDate(rawDate);
    const date = d ? `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}` : String(rawDate).trim();
    const desc=(r[h['Simple Description']]||'').toString().trim();
    const merchant=(r[h['Merchant']]||'').toString().trim()||desc;
    // Handle amounts: Google Sheets may return string or number
    const rawAmt = r[h['Amount']];
    const amt = Math.abs(typeof rawAmt==='number'?rawAmt:parseFloat(String(rawAmt).replace(/[,$]/g,''))||0);
    const catType=(r[h['Category Type']]||'').toString().trim();
    let mapped=cat;
    const low=cat.toLowerCase();
    if(CAT_MAP[low]) mapped=CAT_MAP[low];
    const dk=`${date}|${desc}|${amt}`;
    if(seen.has(dk)) continue;
    seen.add(dk);
    txns.push({date,simpleDescription:desc,merchant,category:mapped,categoryType:catType,primaryCategory:pc,amount:amt});
  }
  txns.sort((a,b)=>{const da=parseAnyDate(a.date),db=parseAnyDate(b.date);return db-da});
  return txns;
}

// ===== PREDICTION ENGINE =====
function buildPredictions(currentMonth, txns2026, txns2024, txns2025, cfg){
  // Two types of predictions:
  // 1. RECURRING: Same merchant + consistent amount across consecutive months
  //    e.g. Breathe Together Yoga ~$158 every month = recurring bill
  //    NOT: Aerosoles bought 2x in 2 years = just shopping
  // 2. OUTLIERS: Unusually large one-off expenses (>$300) from same month in prior years

  const mo = currentMonth; // 0-indexed
  const all2024 = txns2024||[], all2025 = txns2025||[], all2026 = txns2026||[];
  const normalize = s => (s||'').toLowerCase().trim().replace(/[#\d]+$/,'').trim();

  // Current month's 2026 transactions (to detect what's already paid)
  const thisMonthTxns = all2026.filter(t=>{
    const d=parseAnyDate(t.date);
    return d&&d.getFullYear()===2026&&d.getMonth()===mo;
  });
  const paidMerchants = new Set(thisMonthTxns.map(t=>normalize(t.merchant||t.simpleDescription||'')));

  const isPaid = (key) => paidMerchants.has(key) ||
    [...paidMerchants].some(pm => (pm.length>=8 && key.includes(pm.substring(0,8))) ||
                                   (key.length>=8 && pm.includes(key.substring(0,8))));

  // --- STEP 1: Find truly RECURRING bills/subscriptions ---
  // Index every transaction by merchant, tracking each month-year and amount
  const merchantData = {}; // key -> {merchant, category, entries: [{year, month, amount, day}]}
  const indexAll = (txns, year) => {
    (txns||[]).forEach(t=>{
      const merchant = (t.merchant||t.simpleDescription||'').trim();
      const key = normalize(merchant);
      if(!key || key.length < 3) return;
      const d = parseAnyDate(t.date);
      if(!d) return;
      const amt = parseFloat(t.amount)||0;
      if(amt <= 0) return;
      if(!merchantData[key]) merchantData[key] = {merchant, category:t.category||'Other', entries:[]};
      merchantData[key].entries.push({year, month:d.getMonth(), amount:amt, day:d.getDate()});
    });
  };
  indexAll(all2024, 2024);
  indexAll(all2025, 2025);
  indexAll(all2026, 2026);

  const predictions = [];
  const seen = new Set();

  Object.entries(merchantData).forEach(([key, p])=>{
    // Get unique month-years this merchant appeared in
    const monthYears = new Set(p.entries.map(e=>`${e.year}-${String(e.month).padStart(2,'0')}`));
    if(monthYears.size < 3) return; // need at least 3 months

    // Check amount consistency: compute median amount, then check what % of entries
    // are within 30% of the median (bills can fluctuate a bit - utilities, insurance adjustments)
    const amounts = p.entries.map(e=>e.amount).sort((a,b)=>a-b);
    const median = amounts[Math.floor(amounts.length/2)];
    const tolerance = 0.30; // 30% tolerance
    const consistentCount = amounts.filter(a => Math.abs(a-median)/median <= tolerance).length;
    const consistencyRatio = consistentCount / amounts.length;

    // Require at least 70% of charges to be within 30% of median amount
    // This filters out merchants where you shop occasionally at different amounts
    if(consistencyRatio < 0.70) return;

    // Check for consecutive months: sort month-years and find longest consecutive run
    const sortedMY = [...monthYears].sort();
    let maxConsecutive = 1, currentRun = 1;
    for(let i=1; i<sortedMY.length; i++){
      const [py, pm] = sortedMY[i-1].split('-').map(Number);
      const [cy, cm] = sortedMY[i].split('-').map(Number);
      const prevTotal = py*12 + pm;
      const currTotal = cy*12 + cm;
      if(currTotal - prevTotal === 1){
        currentRun++;
        maxConsecutive = Math.max(maxConsecutive, currentRun);
      } else {
        currentRun = 1;
      }
    }

    // Need at least 3 consecutive months to qualify as recurring
    if(maxConsecutive < 3) return;

    // Skip tiny amounts (<$10)
    if(median < 10) return;

    // Estimate expected amount for this specific month (or use median)
    const monthAmounts = p.entries.filter(e=>e.month===mo).map(e=>e.amount);
    const estAmt = monthAmounts.length > 0
      ? monthAmounts.sort((a,b)=>a-b)[Math.floor(monthAmounts.length/2)]
      : median;

    // Expected day of month
    const monthDays = p.entries.filter(e=>e.month===mo).map(e=>e.day);
    const allDays = p.entries.map(e=>e.day);
    const dayPool = monthDays.length > 0 ? monthDays : allDays;
    const avgDay = Math.round(dayPool.reduce((s,d)=>s+d,0) / dayPool.length);

    // Confidence: based on consecutive run length and consistency
    const confidence = maxConsecutive >= 6 && consistencyRatio >= 0.85 ? 'high'
      : maxConsecutive >= 4 ? 'high' : 'medium';

    const budgetCat = cfg.find(c=>c.cat.toLowerCase()===p.category.toLowerCase());
    const sub = budgetCat ? budgetCat.sub : 'Other';

    seen.add(key);
    predictions.push({
      id: 'rec_'+key,
      type: 'recurring',
      merchant: p.merchant,
      category: p.category,
      subCategory: sub,
      amount: Math.round(estAmt*100)/100,
      expectedDay: avgDay,
      confidence,
      frequency: maxConsecutive,
      alreadyPaid: isPaid(key),
    });
  });

  // --- STEP 2: Find OUTLIER large expenses from same month in prior years ---
  const getMonthTxns = (txns, year) => (txns||[]).filter(t=>{
    const d=parseAnyDate(t.date);
    return d&&d.getFullYear()===year&&d.getMonth()===mo;
  });
  const hist2024mo = getMonthTxns(all2024, 2024);
  const hist2025mo = getMonthTxns(all2025, 2025);
  const histThisMonth = [...hist2024mo, ...hist2025mo];

  // Only flag large one-off expenses (>$300) from the same month in prior years
  histThisMonth.forEach(t=>{
    const amt = parseFloat(t.amount)||0;
    if(amt < 300) return;
    const merchant = (t.merchant||t.simpleDescription||'').trim();
    const key = normalize(merchant);
    if(seen.has(key)) return; // already captured as recurring

    const d = parseAnyDate(t.date);
    const budgetCat = cfg.find(c=>c.cat.toLowerCase()===(t.category||'').toLowerCase());
    const sub = budgetCat ? budgetCat.sub : 'Other';

    const inBothYears = hist2024mo.some(x=>normalize((x.merchant||x.simpleDescription||''))===key) &&
                        hist2025mo.some(x=>normalize((x.merchant||x.simpleDescription||''))===key);

    seen.add(key);
    predictions.push({
      id: 'out_'+key,
      type: 'outlier',
      merchant,
      category: t.category||'Other',
      subCategory: sub,
      amount: Math.round(amt*100)/100,
      expectedDay: d ? d.getDate() : 15,
      confidence: inBothYears ? 'high' : 'low',
      alreadyPaid: isPaid(key),
    });
  });

  // Sort: unpaid first, then recurring before outliers, then by amount desc
  predictions.sort((a,b)=>{
    if(a.alreadyPaid !== b.alreadyPaid) return a.alreadyPaid ? 1 : -1;
    if(a.type !== b.type) return a.type==='recurring' ? -1 : 1;
    return b.amount - a.amount;
  });

  return predictions;
}

async function syncFromGoogleSheet(){
  const url = `${SHEET_URL}?key=${encodeURIComponent(SHEET_KEY)}`;
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('Sync failed: '+resp.status);
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  const result = {};
  for(const year of ['2024','2025','2026']){
    if(data[year] && data[year].length>1){
      const txns = parseSheetRows(data[year]);
      if(txns.length>0){
        ls.set('transactions_'+year, txns);
        result[year] = txns.length;
      }
    }
  }
  ls.set('last_sync', new Date().toISOString());
  return result;
}

            {showHistory && catHistory.map((h,i)=>(
              <div key={i} className="history-item">
                <span>{fmt(h.oldBudget)} → {fmt(h.newBudget)}</span>
                <span className={`history-badge ${i<catHistory.length-1?'past':''}`}>
                  {new Date(h.createdAt).toLocaleDateString()}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ===== UPLOAD MODAL =====
function UploadModal({onClose, onUpload, lastSync, onSync, syncing}){
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef();

  const handleFile = async e => {
    const file = e.target.files?.[0];
    if(!file) return;
    setLoading(true);
    try{
      const txns = await parseMSFile(file);
      ls.set('transactions_2026', txns);
      setResult({count:txns.length, total:txns.reduce((s,t)=>s+t.amount,0),
        range:txns.length?`${txns[txns.length-1].date} – ${txns[0].date}`:''});
      onUpload(txns);
    }catch(err){
      alert('Parse error: '+err.message);
    }finally{setLoading(false)}
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <h2>Upload Data</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {/* Google Sheet Sync Section */}
        <div style={{background:'#e4f0ed',borderRadius:10,padding:14,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>☁️ Google Sheet Sync</div>
          <div style={{fontSize:11,color:'#7aaa9f',marginBottom:8}}>
            {lastSync ? `Last synced: ${new Date(lastSync).toLocaleString()}` : 'Never synced'}
          </div>
          <button className="btn btn-primary" style={{width:'100%',padding:10,fontSize:13}} onClick={onSync} disabled={syncing}>
            {syncing?'Syncing...':'Sync Now'}
          </button>
          <div style={{fontSize:10,color:'#7aaa9f',marginTop:6}}>
            Auto-syncs on load if data is older than 1 hour
          </div>
        </div>
        <div style={{fontSize:11,color:'#7aaa9f',textAlign:'center',marginBottom:12}}>— or upload a file manually —</div>

        {result ? (
          <div className="upload-result">
            <div className="check">✓</div>
            <div className="count">{result.count} transactions loaded</div>
            <div className="range">{result.range}</div>
            <div style={{marginTop:8,fontSize:14,fontWeight:500}}>Total: {fmt2(result.total)}</div>
            <button className="btn btn-primary" style={{marginTop:16,width:'100%'}} onClick={onClose}>Done</button>
          </div>
        ) : loading ? (
          <div style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:24,marginBottom:8}}>⏳</div>
            <div style={{color:'#7aaa9f'}}>Parsing file...</div>
          </div>
        ) : (
          <>
            <div className="file-upload-area" onClick={()=>inputRef.current?.click()}>
              <div style={{fontSize:32,marginBottom:8}}>📁</div>
              <div style={{fontSize:14,fontWeight:500}}>Tap to select file</div>
              <div style={{fontSize:12,color:'#7aaa9f',marginTop:4}}>.xlsx from Morgan Stanley</div>
              <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile}/>
            </div>
            <div className="upload-info">
              Parses the Activity section from your Morgan Stanley Spending & Budgeting export.
              Only expense transactions (Funds Paid, Withdrawal) are imported.
              Transfers and credit card payments are excluded automatically.
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ===== CHART: Monthly Spending vs Budget =====
function ChartMonthly({cfg, txns}){
  const ref=useRef(), chartRef=useRef();
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    const spending=Array(12).fill(0);
    const budgets=Array(12).fill(0);
    cfg.forEach(c=>{for(let m=0;m<12;m++) budgets[m]+=c.mo});
    // From seed or transactions
    if(txns&&txns.length>0){
      txns.forEach(t=>{const d=parseAnyDate(t.date);if(d&&d.getFullYear()===2026) spending[d.getMonth()]+=(parseFloat(t.amount)||0)});
    } else {
      cfg.forEach(c=>{for(let m=0;m<3;m++) spending[m]+=(c.actuals[m]||0)});
    }
    chartRef.current=new Chart(ref.current,{type:'bar',data:{
      labels:MONTHS,
      datasets:[
        {label:'Actual',data:spending,backgroundColor:spending.map((s,i)=>s>budgets[i]?'#c05a3a':'#7ecfbd'),borderRadius:4},
        {label:'Budget',data:budgets,type:'line',borderColor:'#1a5c6e',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.1}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},color:'#1a4a55'}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString(),font:{size:9},color:'#7aaa9f'},grid:{color:'#f0f6f4'}},
      x:{ticks:{font:{size:9},color:'#7aaa9f'},grid:{display:false}}}}});
    return ()=>{if(chartRef.current) chartRef.current.destroy()};
  },[cfg,txns]);
  return <canvas ref={ref}/>;
}

// ===== CHART: Essential vs Discretionary =====
function ChartEssDisc({cfg, txns}){
  const ref=useRef(), chartRef=useRef();
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    const ess=Array(3).fill(0), disc=Array(3).fill(0);
    if(txns&&txns.length>0){
      txns.forEach(t=>{
        const d=parseAnyDate(t.date); if(d.getFullYear()!==2026||d.getMonth()>2) return;
        const c=cfg.find(x=>x.cat===t.category);
        if(c){(c.type==='Essential'?ess:disc)[d.getMonth()]+=(parseFloat(t.amount)||0)}
      });
    } else {
      cfg.forEach(c=>{for(let m=0;m<3;m++){(c.type==='Essential'?ess:disc)[m]+=(c.actuals[m]||0)}});
    }
    chartRef.current=new Chart(ref.current,{type:'bar',data:{
      labels:['Jan','Feb','Mar'],
      datasets:[
        {label:'Essential',data:ess,backgroundColor:'#1a5c6e',borderRadius:4},
        {label:'Discretionary',data:disc,backgroundColor:'#f0b97a',borderRadius:4}
      ]},options:{responsive:true,maintainAspectRatio:false,scales:{
        x:{stacked:true,ticks:{font:{size:10}},grid:{display:false}},
        y:{stacked:true,beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString(),font:{size:9}},grid:{color:'#f0f6f4'}}
      },plugins:{legend:{labels:{font:{size:10},color:'#1a4a55'}}}}});
    return ()=>{if(chartRef.current) chartRef.current.destroy()};
  },[cfg,txns]);
  return <canvas ref={ref}/>;
}

// ===== CHART: Year-over-Year =====
function ChartYoY({txns2024, txns2025, txns2026}){
  const ref=useRef(), chartRef=useRef();
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    const sumByMonth = txns => {
      const m=Array(12).fill(0);
      (txns||[]).forEach(t=>{const d=parseAnyDate(t.date);if(d) m[d.getMonth()]+=(parseFloat(t.amount)||0)});
      return m;
    };
    const d24=sumByMonth(txns2024), d25=sumByMonth(txns2025), d26=sumByMonth(txns2026);
    const datasets=[];
    if(txns2024.length>0) datasets.push({label:'2024',data:d24,borderColor:'#b0c9c2',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.2});
    if(txns2025.length>0) datasets.push({label:'2025',data:d25,borderColor:'#f0b97a',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.2});
    datasets.push({label:'2026',data:d26,borderColor:'#1a5c6e',backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,tension:.2});
    chartRef.current=new Chart(ref.current,{type:'line',data:{labels:MONTHS,datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},color:'#1a4a55'}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString(),font:{size:9},color:'#7aaa9f'},grid:{color:'#f0f6f4'}},
      x:{ticks:{font:{size:9},color:'#7aaa9f'},grid:{display:false}}}}});
    return ()=>{if(chartRef.current) chartRef.current.destroy()};
  },[txns2024,txns2025,txns2026]);
  return <canvas ref={ref}/>;
}

// ===== MAIN APP =====
function App(){
  const [tab, setTab] = useState('budget');
  const [mi, setMi] = useState(2); // March
  const [cfg, setCfg] = useState(()=>initConfig());
  const [txns, setTxns] = useState(()=>ls.get('transactions_2026')||[]);
  const [txns2024, setTxns2024] = useState(()=>ls.get('transactions_2024')||[]);
  const [txns2025, setTxns2025] = useState(()=>ls.get('transactions_2025')||[]);
  const [expanded, setExpanded] = useState(null);
  const [editCat, setEditCat] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [search, setSearch] = useState('');
  const [filterSub, setFilterSub] = useState(null);
  const [filterCat, setFilterCat] = useState(null);
  const [notif, setNotif] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(()=>ls.get('last_sync'));
  const [showDismissed, setShowDismissed] = useState(false);
  const [showPaid, setShowPaid] = useState(false);
  const monthBarRef = useRef();
  const predState = useState(()=>ls.get('predictions_state')||{});
  const [predictions, setPredictions] = predState;

  const notify = (msg,type='success')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),2500)};

  // Sync from Google Sheet on first load
  const doSync = async ()=>{
    setSyncing(true);
    try{
      const result = await syncFromGoogleSheet();
      const years = Object.keys(result);
      if(years.length===0){notify('No new data found','error');setSyncing(false);return}
      if(result['2026']){setTxns(ls.get('transactions_2026')||[])}
      if(result['2024']){setTxns2024(ls.get('transactions_2024')||[])}
      if(result['2025']){setTxns2025(ls.get('transactions_2025')||[])}
      setLastSync(new Date().toISOString());
      const summary = years.map(y=>`${y}: ${result[y]}`).join(', ');
      notify(`Synced! ${summary} transactions`);
    }catch(err){
      notify('Sync failed: '+err.message,'error');
    }finally{setSyncing(false)}
  };

  // Auto-sync on load if last sync was >1 hour ago
  useEffect(()=>{
    const last = ls.get('last_sync');
    const hourAgo = Date.now() - 60*60*1000;
    if(!last || new Date(last).getTime() < hourAgo){
      doSync();
    }
  },[]);

  // Scroll active month pill into view
  useEffect(()=>{
    if(monthBarRef.current){
      const active = monthBarRef.current.querySelector('.mpill.active');
      if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    }
  },[mi]);

  const actuals = useMemo(()=>getActuals(mi, cfg, txns.length>0?txns:null),[mi,cfg,txns]);
  const ytdActuals = useMemo(()=>getYTDActuals(cfg, txns.length>0?txns:null),[cfg,txns]);

  // Predicted upcoming expenses from historical analysis
  const computedPredictions = useMemo(()=>{
    if(txns2024.length===0 && txns2025.length===0) return [];
    return buildPredictions(mi, txns, txns2024, txns2025, cfg);
  },[mi, txns, txns2024, txns2025, cfg]);

  const ess = typeTotals('Essential', cfg, actuals, mi);
  const disc = typeTotals('Discretionary', cfg, actuals, mi);
  const totalSpent = ess.spent + disc.spent;
  const totalBudget = ess.budget + disc.budget;

  // YTD totals for strip
  const ytdEss = typeTotals('Essential', cfg, ytdActuals, 12);
  const ytdDisc = typeTotals('Discretionary', cfg, ytdActuals, 12);
  const ytdTotal = {spent: ytdEss.spent+ytdDisc.spent, budget: ytdEss.budget+ytdDisc.budget};

  // Confirmed predictions total
  const confirmedPreds = Object.values(predictions).filter(p=>p.confirmed);
  const confirmedTotal = confirmedPreds.reduce((s,p)=>s+p.amount,0);
  const trueAvailable = totalBudget - totalSpent - confirmedTotal;

  // Group cfg by sub-category for budget tab
  const grouped = useMemo(()=>{
    const g = {};
    cfg.forEach(c=>{
      const k = c.type+'|'+c.sub;
      if(!g[k]) g[k]={type:c.type, sub:c.sub, cats:[]};
      g[k].cats.push(c);
    });
    return g;
  },[cfg]);

  // Filtered transactions for Transactions tab
  const filteredTxns = useMemo(()=>{
    let list = txns.length>0 ? [...txns] : [];
    // If no uploaded txns, create synthetic ones from seed for display
    if(list.length===0 && mi<=2){
      cfg.forEach(c=>{
        const val = c.actuals[mi]||0;
        if(val>0) list.push({date:`${String(mi+1).padStart(2,'0')}/01/2026`,merchant:c.cat+' (seed)',category:c.cat,amount:val,simpleDescription:c.cat});
      });
    }
    // Filter by month
    if(mi<12){
      list = list.filter(t=>{const d=parseAnyDate(t.date);return d.getMonth()===mi && d.getFullYear()===2026});
    } else {
      list = list.filter(t=>{const d=parseAnyDate(t.date);return d.getFullYear()===2026 && d.getMonth()<=2});
    }
    if(filterCat) list = list.filter(t=>t.category===filterCat);
    else if(filterSub) list = list.filter(t=>{const c=cfg.find(x=>x.cat===t.category);return c&&c.sub===filterSub});
    if(search) list = list.filter(t=>(t.merchant||t.simpleDescription||'').toLowerCase().includes(search.toLowerCase()));
    return list;
  },[txns,mi,filterSub,filterCat,search,cfg]);

  const saveBudget = (catName, newAmt)=>{
    const updated = cfg.map(c=>c.cat===catName?{...c,mo:newAmt,yr:newAmt*12}:c);
    setCfg(updated);
    ls.set('budget_config',updated);
    notify('Budget updated');
  };

  const handleUpload = txns=>{setTxns(txns);notify(`${txns.length} transactions loaded`)};

  // Navigate to transactions tab filtered by a specific category
  const drillToCategory = (catName)=>{
    setFilterCat(catName);
    setFilterSub(null);
    setSearch('');
    setTab('transactions');
  };

  // ===== RENDER: Budget Tab =====
  const renderBudget = ()=>{
    const spentPct = pct(totalSpent,totalBudget);
    const predPct = pct(confirmedTotal,totalBudget);
    return <>
      {/* Header card */}
      <div className="hcard">
        <div className="hero-num">{fmt(totalSpent)}</div>
        <div className="hero-sub">of {fmt(totalBudget)} budget</div>
        <div className="pbar">
          <div className="seg-spent" style={{width:Math.min(spentPct,100)+'%'}}/>
          {confirmedTotal>0&&<div className="seg-pred" style={{width:Math.min(predPct,100-Math.min(spentPct,100))+'%'}}/>}
          <div className="seg-rem"/>
        </div>
        <div className="legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#7ecfbd'}}/><span>Spent</span></div>
          {confirmedTotal>0&&<div className="legend-item"><div className="legend-dot" style={{background:'#f0b97a'}}/><span>Predicted</span></div>}
          <div className="legend-item"><div className="legend-dot" style={{background:'rgba(255,255,255,.15)'}}/><span>Remaining</span></div>
        </div>
        {confirmedTotal>0&&(
          <div className="upcoming-banner">
            <div className="ub-amt">{fmt(confirmedTotal)} confirmed upcoming</div>
            <div className="ub-avail">True available: {fmt(Math.max(trueAvailable,0))}</div>
          </div>
        )}
        <div className="type-cards">
          {[['Essential',ess],['Discretionary',disc]].map(([label,data])=>{
            const p=pct(data.spent,data.budget);
            return <div key={label} className="tcard">
              <div className="tcard-label">{label}</div>
              <div className="tcard-amt">{fmt(data.spent)}</div>
              <div className="tcard-bar"><div className="tcard-fill" style={{width:Math.min(p,100)+'%',background:p>=100?'#c05a3a':p>=75?'#d4924a':'#7ecfbd'}}/></div>
              <div className="tcard-meta"><span>{p.toFixed(0)}%</span><span>{fmt(Math.max(data.budget-data.spent,0))} left</span></div>
            </div>
          })}
        </div>
      </div>
      {/* YTD Strip */}
      <div className="ytd-strip">
        {[['YTD Total',ytdTotal],['Essential',ytdEss],['Discretionary',ytdDisc]].map(([label,d])=>{
          const delta=d.spent-d.budget;
          return <div key={label} className="ytd-tile">
            <div className="ytd-amt">{fmt(d.spent)}</div>
            <div className="ytd-label">{label}</div>
            <div className={`ytd-delta ${delta>0?'over':'under'}`}>
              {delta>0?'+'+fmt(delta)+' over':fmt(Math.abs(delta))+' under'}
            </div>
          </div>
        })}
      </div>
      {/* Category list */}
      {['Essential','Discretionary'].map(type=>(
        <div key={type}>
          <div className="sec-hdr">{type}</div>
          {Object.values(grouped).filter(g=>g.type===type).map(g=>{
            const spent = g.cats.reduce((s,c)=>s+(actuals[c.cat]||0),0);
            const budget = g.cats.reduce((s,c)=>s+(mi===12?c.mo*3:c.mo),0);
            const p = pct(spent,budget);
            const em = EMOJIS[g.sub]||{e:'📦',bg:'#e8f4f0'};
            const isExp = expanded===g.sub;
            return <div key={g.sub}>
              <div className="cat-row" onClick={()=>setExpanded(isExp?null:g.sub)}>
                <div className="cat-emoji" style={{background:em.bg}}>{em.e}</div>
                <div className="cat-info">
                  <div className="cat-name">{g.sub}</div>
                  <div className="cat-bar">
                    <div className={`cat-fill ${barClass(p)}`} style={{width:Math.min(p,100)+'%'}}/>
                  </div>
                  <div className="cat-amounts">
                    <span className={`cat-spent ${spent>budget?'over':''}`}>{fmt(spent)}</span>
                    <span className="cat-budget">of {fmt(budget)}</span>
                  </div>
                </div>
                <div className={`cat-badge ${barClass(p)}`}>{p>=100?'Over':p.toFixed(0)+'%'}</div>
                <div className="expand-icon">{isExp?'▾':'›'}</div>
              </div>
              {isExp && g.cats.map(c=>{
                const cs=actuals[c.cat]||0;
                const cb=mi===12?c.mo*3:c.mo;
                return <div key={c.cat} className="detail-row detail-clickable" onClick={()=>drillToCategory(c.cat)}>
                  <div className="detail-name">{c.cat}<span className="drill-hint">View transactions ›</span></div>
                  <div className="detail-vals">
                    <div className={`detail-spent ${cs>cb?'over':''}`}>{fmt(cs)}</div>
                    <div className="detail-bgt">of {fmt(cb)}</div>
                  </div>
                  <button className="edit-btn" onClick={e=>{e.stopPropagation();setEditCat(c)}}>✏️</button>
                </div>
              })}
            </div>
          })}
        </div>
      ))}
    </>;
  };

  // ===== RENDER: Transactions Tab =====
  const renderTransactions = ()=>{
    const subs = [...new Set(cfg.map(c=>c.sub))];
    return <>
      {filterCat && (
        <div className="cat-filter-banner">
          <span>Showing: <strong>{filterCat}</strong></span>
          <button className="cat-filter-clear" onClick={()=>setFilterCat(null)}>✕ Clear</button>
        </div>
      )}
      <div className="search-wrap">
        <input className="search-input" placeholder="Search merchant..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="filter-bar">
        <button className={`fpill ${!filterSub&&!filterCat?'active':''}`} onClick={()=>{setFilterSub(null);setFilterCat(null)}}>All</button>
        {subs.map(s=><button key={s} className={`fpill ${filterSub===s&&!filterCat?'active':''}`} onClick={()=>{setFilterSub(filterSub===s?null:s);setFilterCat(null)}}>{s}</button>)}
      </div>
      {filteredTxns.length===0?(
        <div className="empty"><div className="empty-icon">📋</div><div className="empty-title">No Transactions</div>
          <div className="empty-text">{txns.length===0?'Upload a Morgan Stanley export to see transactions':'No transactions match your filters'}</div></div>
      ):(
        <div>{filteredTxns.map((t,i)=>(
          <div key={i} className="tx-item">
            <div className="tx-date">{fmtDate(t.date)}</div>
            <div className="tx-info">
              <div className="tx-merchant">{t.merchant||t.simpleDescription||t.category}</div>
              <div className="tx-cat">{t.category}</div>
            </div>
            <div className="tx-amt" style={{color:'#1a4a55'}}>-{fmt2(parseFloat(t.amount)||0)}</div>
          </div>
        ))}</div>
      )}
    </>;
  };

  // ===== RENDER: Upcoming Tab =====
  const renderUpcoming = ()=>{
    const hasHistory = txns2024.length>0 || txns2025.length>0;
    if(!hasHistory){
      return <div className="empty">
        <div className="empty-icon">🔮</div>
        <div className="empty-title">Predictions Coming Soon</div>
        <div className="empty-text">Upload 2024 and 2025 transaction data to enable spending predictions. The prediction engine needs historical data to identify recurring patterns.</div>
      </div>;
    }

    const unpaid = computedPredictions.filter(p=>!p.alreadyPaid);
    const paid = computedPredictions.filter(p=>p.alreadyPaid);
    const unpaidTotal = unpaid.reduce((s,p)=>s+p.amount,0);

    // Track which predictions user has confirmed or dismissed
    const confirmed = predictions; // from persisted state
    const toggleConfirm = (id)=>{
      const next = {...predictions};
      if(next[id]?.confirmed){
        delete next[id];
      } else {
        const pred = computedPredictions.find(p=>p.id===id);
        if(pred) next[id] = {confirmed:true, amount:pred.amount};
      }
      setPredictions(next);
      ls.set('predictions_state', next);
    };
    const dismissPred = (id)=>{
      const next = {...predictions};
      next[id] = {dismissed:true};
      setPredictions(next);
      ls.set('predictions_state', next);
    };

    const visibleUnpaid = unpaid.filter(p=>!predictions[p.id]?.dismissed);
    const dismissed = unpaid.filter(p=>predictions[p.id]?.dismissed);

    return <>
      {/* Summary card */}
      <div className="pred-summary">
        <div className="pred-summary-title">Predicted for rest of {MONTHS[mi]}</div>
        <div className="pred-summary-amt">{fmt(unpaidTotal)}</div>
        <div className="pred-summary-sub">
          {visibleUnpaid.length} expected expense{visibleUnpaid.length!==1?'s':''} remaining
        </div>
        <div className="pred-summary-meta">
          Based on {MONTHS[mi]} spending in {txns2024.length>0?'2024':''}
          {txns2024.length>0&&txns2025.length>0?' & ':''}
          {txns2025.length>0?'2025':''}
        </div>
      </div>

      {/* Recurring bills */}
      {visibleUnpaid.filter(p=>p.type==='recurring').length>0 && <div className="pred-section-hdr">Recurring Bills & Subscriptions</div>}
      {visibleUnpaid.filter(p=>p.type==='recurring').map(p=>{
        const isConfirmed = predictions[p.id]?.confirmed;
        const em = EMOJIS[p.subCategory]||{e:'📦',bg:'#e8f4f0'};
        return <div key={p.id} className={`pred-card ${isConfirmed?'confirmed':''}`}>
          <div className="pred-left">
            <div className="pred-emoji" style={{background:em.bg}}>{em.e}</div>
            <div className="pred-info">
              <div className="pred-merchant">{p.merchant}</div>
              <div className="pred-cat">{p.category}</div>
              <div className="pred-meta">
                ~Day {p.expectedDay} · {p.frequency} consecutive mo · {p.confidence==='high'?'High':'Med'} confidence</div>
            </div>
          </div>
          <div className="pred-right">
            <div className="pred-amt">{fmt2(p.amount)}</div>
            <div className="pred-actions">
              <button className={`pred-btn ${isConfirmed?'confirmed':''}`}
                onClick={()=>toggleConfirm(p.id)} title={isConfirmed?'Unconfirm':'Confirm'}>
                {isConfirmed?'✓ Yes':'Expect'}
              </button>
              <button className="pred-btn dismiss" onClick={()=>dismissPred(p.id)} title="Dismiss">✕</button>
            </div>
          </div>
        </div>
      })}

      {/* Large outlier expenses */}
      {visibleUnpaid.filter(p=>p.type==='outlier').length>0 && <div className="pred-section-hdr">Notable Expenses (from prior {MONTHS[mi]})</div>}
      {visibleUnpaid.filter(p=>p.type==='outlier').map(p=>{
        const isConfirmed = predictions[p.id]?.confirmed;
        const em = EMOJIS[p.subCategory]||{e:'📦',bg:'#e8f4f0'};
        return <div key={p.id} className={`pred-card outlier ${isConfirmed?'confirmed':''}`}>
          <div className="pred-left">
            <div className="pred-emoji" style={{background:'#fde8d8'}}>⚡</div>
            <div className="pred-info">
              <div className="pred-merchant">{p.merchant}</div>
              <div className="pred-cat">{p.category}</div>
              <div className="pred-meta">
                {p.confidence==='high'?'Appeared in both years':'Last year'} · Heads up</div>
            </div>
          </div>
          <div className="pred-right">
            <div className="pred-amt">{fmt2(p.amount)}</div>
            <div className="pred-actions">
              <button className={`pred-btn ${isConfirmed?'confirmed':''}`}
                onClick={()=>toggleConfirm(p.id)} title={isConfirmed?'Unconfirm':'Confirm'}>
                {isConfirmed?'✓ Yes':'Expect'}
              </button>
              <button className="pred-btn dismiss" onClick={()=>dismissPred(p.id)} title="Dismiss">✕</button>
            </div>
          </div>
        </div>
      })}

      {/* Dismissed section */}
      {dismissed.length>0 && (
        <>
          <button className="pred-toggle" onClick={()=>setShowDismissed(!showDismissed)}>
            {showDismissed?'▼':'▶'} Dismissed ({dismissed.length})
          </button>
          {showDismissed && dismissed.map(p=>{
            const em = EMOJIS[p.subCategory]||{e:'📦',bg:'#e8f4f0'};
            return <div key={p.id} className="pred-card dismissed">
              <div className="pred-left">
                <div className="pred-emoji" style={{background:em.bg}}>{em.e}</div>
                <div className="pred-info">
                  <div className="pred-merchant">{p.merchant}</div>
                  <div className="pred-cat">{p.category}</div>
                </div>
              </div>
              <div className="pred-right">
                <div className="pred-amt">{fmt2(p.amount)}</div>
                <button className="pred-btn" onClick={()=>{
                  const next={...predictions};delete next[p.id];setPredictions(next);ls.set('predictions_state',next);
                }}>Restore</button>
              </div>
            </div>
          })}
        </>
      )}

      {/* Already paid section */}
      {paid.length>0 && (
        <>
          <button className="pred-toggle" onClick={()=>setShowPaid(!showPaid)}>
            {showPaid?'▼':'▶'} Already Paid This Month ({paid.length})
          </button>
          {showPaid && paid.map(p=>{
            const em = EMOJIS[p.subCategory]||{e:'📦',bg:'#e8f4f0'};
            return <div key={p.id} className="pred-card paid">
              <div className="pred-left">
                <div className="pred-emoji" style={{background:em.bg}}>{em.e}</div>
                <div className="pred-info">
                  <div className="pred-merchant">{p.merchant}</div>
                  <div className="pred-cat">{p.category} · ✓ Paid</div>
                </div>
              </div>
              <div className="pred-right">
                <div className="pred-amt">{fmt2(p.amount)}</div>
              </div>
            </div>
          })}
        </>
      )}

      {computedPredictions.length===0 && (
        <div className="empty" style={{marginTop:20}}>
          <div className="empty-icon">🤔</div>
          <div className="empty-title">No predictions for {MONTHS[mi]}</div>
          <div className="empty-text">Not enough historical data for this month yet. Try selecting a month where you have both 2024 and 2025 data.</div>
        </div>
      )}
    </>;
  };

  // ===== RENDER: Trends Tab =====
  const renderTrends = ()=>{
    const ytdAct = getYTDActuals(cfg, txns.length>0?txns:null);
    return <>
      <div className="chart-section">
        <div className="chart-title">Monthly Spending vs Budget</div>
        <div className="chart-wrap"><ChartMonthly cfg={cfg} txns={txns.length>0?txns:null}/></div>
      </div>
      <div className="chart-section">
        <div className="chart-title">Essential vs Discretionary</div>
        <div className="chart-wrap"><ChartEssDisc cfg={cfg} txns={txns.length>0?txns:null}/></div>
      </div>
      <div className="chart-section">
        <div className="chart-title">Top 5 Categories (YTD)</div>
        <div className="chart-wrap"><ChartTop5 cfg={cfg} actuals={ytdAct}/></div>
      </div>
      {(txns2024.length>0||txns2025.length>0) && <div className="chart-section">
        <div className="chart-title">Year-over-Year Comparison</div>
        <div className="chart-wrap"><ChartYoY txns2024={txns2024} txns2025={txns2025} txns2026={txns}/></div>
      </div>}
    </>;
  };

  return (
    <>
      <div className="app-header">
        <h1>Budget Tracker</h1>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <button className="gear-btn" onClick={doSync} disabled={syncing} title="Sync from Google Sheet">
            {syncing?'⏳':'🔄'}
          </button>
          <button className="gear-btn" onClick={()=>setShowUpload(true)}>⚙️</button>
        </div>
      </div>
      <div className="month-bar" ref={monthBarRef}>
        {MONTHS.map((m,i)=><button key={i} className={`mpill ${mi===i?'active':''} ${i>2&&txns.length===0?'empty':''}`} onClick={()=>setMi(i)}>{m}</button>)}
        <button className={`mpill ${mi===12?'active':''}`} onClick={()=>setMi(12)}>YTD</button>
      </div>
      <div className="main-scroll">
        {tab==='budget'&&renderBudget()}
        {tab==='transactions'&&renderTransactions()}
        {tab==='upcoming'&&renderUpcoming()}
        {tab==='trends'&&renderTrends()}
      </div>
      <div className="bottom-nav">
        {[['budget','📊','Budget'],['transactions','📋','Trans'],['upcoming','⏰','Upcoming'],['trends','📈','Trends']].map(([k,icon,label])=>(
          <button key={k} className={`nav-btn ${tab===k?'active':''}`} onClick={()=>setTab(k)}>
            <div className="ni">{icon}</div><div>{label}</div>
          </button>
        ))}
      </div>
      {showUpload&&<UploadModal onClose={()=>setShowUpload(false)} onUpload={handleUpload} lastSync={lastSync} onSync={doSync} syncing={syncing}/>}
      {editCat&&<EditModal cat={editCat} cfg={cfg} onSave={saveBudget} onClose={()=>setEditCat(null)}/>}
      {notif&&<div className={`notif ${notif.type}`}>{notif.msg}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
